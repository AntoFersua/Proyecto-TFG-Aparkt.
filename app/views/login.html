<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In</title>
    <link rel="stylesheet" href="estilosGlobales.css" />
  </head>
  <body>
    <!--HEADER-->
    <header>
      <!-- NAVEGACIÓN -->
      <img src="logo.png" alt="Logo" />
      <!--METER LOGO Y PONER DISPLAY:BLOCK-->

      <nav class="navDerecha">
        <ul>
          <li><a href="#">Mapa</a></li>
          <li><a href="#">Aparkt</a></li>
        </ul>
      </nav>
      <nav class="navIzquierda">
        <ul>
          <li><a href="#">Log In</a></li>
          <li><a href="#">Sign Up</a></li>
        </ul>
      </nav>
      <div id="headerDerecha">
        <button>Idioma</button>
        <button>Toggle</button>
        <!--METER TOGGLE -->
      </div>
    </header>

    <!--MAIN-->
    <main>
      <form>
        <h2>BIENVENIDO</h2>

        <!-- Logo Aparkt -->
        <div>
          <img src="logo.png" alt="Logo" />
          <!--METER LOGO-->
        </div>

        <!-- Email -->
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Email"
          required
        />

        <!-- Contraseña -->
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Contraseña"
          required
        />

        <!-- Pregunta de si ha olvidado la contraseña -->
        <a href="#">¿He olvidado la contraseña?</a>

        <!-- Checkbox para recordar sesión -->
        <label><input type="checkbox" name="recordar" />Recuérdame</label>

        <!-- Botón de iniciar sesión-->
        <button type="submit">Iniciar sesión</button>

        <!-- Enlace para crear usuario nuevo -->
        <p>¿Nuevo usuario? <a href="#">Crear cuenta</a></p>
      </form>
    </main>

    <!--FOOTER-->
    <footer>
      <div>
        <img src="logo.png" alt="Logo" />
        <!--METER LOGO -->
      </div>
      <!--redes-->
      <section class="sectionRedes">
        <p>Instagram</p>
        <p>LinkedIn</p>
        <p>Twitter</p>
        <p>Youtube</p>
        <p>TikTok</p>
      </section>

      <!--pago-->
      <section class="sectionPago">
        <p>PayPal</p>
        <p>Bizzum</p>
        <p>Tarjeta de crédito</p>
      </section>

      <p>2026.Copyright</p>
    </footer>
  </body>
</html>
