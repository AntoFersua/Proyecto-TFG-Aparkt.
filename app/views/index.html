<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapa Aparkt</title>
    <link
      href="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css"
      rel="stylesheet"
    />
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.js"></script>
    <script src="https://npmcdn.com/@turf/turf/turf.min.js"></script>
    <script src="https://unpkg.com/just-validate@latest/dist/just-validate.production.min.js"></script>
    <script src="validacionVehiculo.js"></script>
    <script src="index.js" type="module"></script>
    <script src="funcionesGlobales.js" defer></script>
    <link rel="stylesheet" type="text/css" href="estilosGlobales.css" />
    <style>
      body {
        margin: 0;
        padding: 0;
      }
      #mapa {
        width: 100%;
        height: calc(100vh - 70px);
        margin-top: 70px;
      }
      #form-busqueda {
        position: absolute;
        top: 80px;
        left: 20px;
        z-index: 5;
      }
      input[type="text"] {
        width: 300px;
        height: 40px;
        font-size: 16px;
        padding: 10px 20px;
      }
      input[type="submit"] {
        padding: 10px 20px;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <!--HEADER-->
    <header>
      <!-- NAVEGACIÓN -->
      <div class="logoHeader">
        <img src="assets/imagotipoAparkt.png" alt="Logo" />
      </div>
      <!-- METER LOGO Y PONER DISPLAY:BLOCK -->
      <nav class="navPrincipal">
        <ul>
          <li><a href="index.html">Mapa</a></li>
          <li><a href="aparkt/aparkt.html">Aparkt</a></li>
          <li data-auth="hide"><a href="login/login.html">Log In</a></li>
          <li data-auth="hide"><a href="signup/signup.html">Sign Up</a></li>
        </ul>
      </nav>
      <div id="headerDerecha">
        <button>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            fill="white"
            class="bi bi-translate"
            viewBox="0 0 16 16"
          >
            <path
              d="M4.545 6.714 4.11 8H3l1.862-5h1.284L8 8H6.833l-.435-1.286zm1.634-.736L5.5 3.956h-.049l-.679 2.022z"
            />
            <path
              d="M0 2a2 2 0 0 1 2-2h7a2 2 0 0 1 2 2v3h3a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-3H2a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1zm7.138 9.995q.289.451.63.846c-.748.575-1.673 1.001-2.768 1.292.178.217.451.635.555.867 1.125-.359 2.08-.844 2.886-1.494.777.665 1.739 1.165 2.93 1.472.133-.254.414-.673.629-.89-1.125-.253-2.057-.694-2.82-1.284.681-.747 1.222-1.651 1.621-2.757H14V8h-3v1.047h.765c-.318.844-.74 1.546-1.272 2.13a6 6 0 0 1-.415-.492 2 2 0 0 1-.94.31"
            />
          </svg>
        </button>
        <button id="perfilUsuario">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            fill="white"
            class="bi bi-person"
            viewBox="0 0 16 16"
          >
            <path
              d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0zm4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4zm-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10c-2.29 0-3.516.68-4.168 1.332-.678.678-.83 1.418-.832 1.664h10z"
            />
          </svg>
        </button>
        <button>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="white"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>
      </div>
    </header>
    <!-- Banner lateral de usuario -->
    <aside id="bannerUsuario" class="banner-lateral">
      <button class="cerrar-banner" id="cerrarBanner">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 384 512"
          width="18"
          height="18"
        >
          <path
            fill="white"
            d="M376.6 84.5c11.3-13.6 9.5-33.8-4.1-45.1s-33.8-9.5-45.1 4.1L192 206 56.6 43.5C45.3 29.9 25.1 28.1 11.5 39.4S-3.9 70.9 7.4 84.5L150.3 256 7.4 427.5c-11.3 13.6-9.5 33.8 4.1 45.1s33.8 9.5 45.1-4.1L192 306 327.4 468.5c11.3 13.6 31.5 15.4 45.1 4.1s15.4-31.5 4.1-45.1L233.7 256 376.6 84.5z"
          />
        </svg>
      </button>
      <div class="banner-header">
        <h2>Mi Perfil</h2>
      </div>
      <div class="banner-body">
        <div class="menu-superior">
          <div class="menu-opciones">
            <button class="opcion-btn">Cambiar contraseña</button>
            <button class="opcion-btn">Editar foto de perfil</button>
            <button class="opcion-btn">Cambiar email</button>
            <button class="opcion-btn">Editar vehículo</button>
            <button class="opcion-btn">Borrar vehículo</button>
            <button class="opcion-btn anadirVehiculo">
              Añadir mi vehículo
            </button>
          </div>
          <form id="formVehiculo" class="form-vehiculo" style="display: none">
            <div class="form-group">
              <label for="tipoVehiculo">Tipo de vehículo</label>
              <select id="tipoVehiculo" name="tipo_vehiculo" required>
                <option value=""></option>
                <option value="turismo">Turismo</option>
                <option value="ranchera">Ranchera</option>
                <option value="todoterreno">Todoterreno</option>
                <option value="monovolumen">Monovolumen</option>
                <option value="furgo">Furgoneta</option>
                <option value="otro">Otro</option>
              </select>
            </div>
            <div class="form-group">
              <label for="tamanoVehiculo">Tamaño</label>
              <select id="tamanoVehiculo" name="tamano" required>
                <option value=""></option>
                <option value="pequeno">Pequeño</option>
                <option value="mediano">Mediano</option>
                <option value="grande">Grande</option>
              </select>
            </div>
            <button type="submit" class="btn-guardar">Guardar</button>
          </form>
        </div>
        <div class="menu-inferior">
          <button class="opcion-btn" id="logout">Cerrar sesión</button>
          <button class="opcion-btn danger">Eliminar cuenta</button>
        </div>
      </div>
    </aside>
    <div id="mapa"></div>
    <form action="" method="get" id="form-busqueda">
      <input type="text" id="busqueda" placeholder="Escribe una dirección" />
      <input type="submit" value="Enviar" />
    </form>
  </body>
</html>
