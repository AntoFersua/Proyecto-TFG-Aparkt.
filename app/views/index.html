<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapa Aparkt</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.js"></script>
    <script src="https://npmcdn.com/@turf/turf/turf.min.js"></script>
    <script src="index.js"></script>
    <script src="funcionesGlobales.js" defer></script>
    <link rel="stylesheet" type="text/css" href="estilosGlobales.css" />
    <style>
        body{
            margin: 0;
            padding: 0;
        }
        #mapa{
            width: 100%;
            position: absolute; 
            top: 0; 
            bottom: 0; 
        }
        form{
            z-index: 1;
        }
        input[type="text"]{
            width: 300px;
            height: 40px;
            font-size: 16px;
            padding: 10px 20px;
            margin-top: 10px;
        }
        input[type="submit"] {
            padding: 10px 20px;
            font-size: 16px;
            margin-top: 10px;
        }
    </style>
  </head>
  <body>
    <div id="mapa"></div>
    <form action="" method="get">
        <input type="text" id="busqueda" placeholder="Escribe una dirección">
        <input type="submit" value="Enviar">
    </form>
  </body>
</html>
