<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapa Aparkt</title>
    <link
      href="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css"
      rel="stylesheet"
    />
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.js"></script>
    <script src="https://npmcdn.com/@turf/turf/turf.min.js"></script>
    <script src="https://unpkg.com/just-validate@latest/dist/just-validate.production.min.js"></script>
    <script src="validacionVehiculo.js"></script>
    <script src="index.js" type="module"></script>
    <!-- <script src="funcionesGlobales.js" defer></script> -->
    <!-- <link rel="stylesheet" type="text/css" href="estilosGlobales.css" /> -->
    <style>
      body {
        margin: 0;
        padding: 0;
      }
      #mapa {
        /*width: 100%;
        height: calc(100vh - 70px);
        margin-top: 70px;*/
        width: 100%;
        position: absolute;
        top: 0;
        bottom: 0;
      }
      #form-busqueda {
        position: absolute;
        top: 10px;
        left: 20px;
        z-index: 5;
      }
      input[type="text"] {
        width: 300px;
        height: 20px;
        font-size: 16px;
        padding: 10px 20px;
      }
      input[type="submit"] {
        padding: 10px 20px;
        font-size: 16px;
      }
      #mostrarEstadosAparcamientos {
        position: absolute;
        bottom: 120px;
        left: 20px;
        z-index: 5;
        }
        #mostrarAparcamientos {
        position: absolute;
        bottom: 100px;
        left: 20px;
        z-index: 5;
        }
        #mostrarMarcadoresAnunciante {
        position: absolute;
        bottom: 80px;
        left: 20px;
        z-index: 5;
        }
        #mostrarMarcadoresUsuario {
        position: absolute;
        bottom: 60px;
        left: 20px;
        z-index: 5;
        }
        .estadoVisualMarker{
            display: none;
        }
    </style>
  </head>
  <body>
    <!-- <app-header></app-header> -->
    <!-- <perfil-usuario></perfil-usuario> -->
    <div id="mapa"></div>
    <form action="" method="get" id="form-busqueda">
      <input type="text" id="busqueda" placeholder="Escribe una dirección" />
      <input type="submit" value="Enviar" />
    </form>
    <button id="mostrarEstadosAparcamientos">Mostrar estados aparcamientos</button>
    <button id="mostrarAparcamientos">Mostrar aparcamientos</button>
    <button id="mostrarMarcadoresUsuario">Mostrar marcadores usuario</button>
    <button id="mostrarMarcadoresAnunciante">Mostrar marcadores anunciantes</button>
  </body>
</html>
