<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Inicia sesión en Aparkt" />
    <meta name="keywords" content="Sesión, Aparkt, Aparcamiento" />
    <meta name="author" content="Aparkt" />
    <title>Log In</title>
    <link rel="stylesheet" type="text/css" href="../estilosGlobales.css" />
    <link rel="stylesheet" type="text/css" href="login.css" />
    <script src="../validacionVehiculo.js"></script>
    <script src="../just-validate.min.js"></script>
    <!-- <script src="../components/Modalpuntos.js"></script> -->
    <script src="../funcionesGlobales.js" defer></script>
    <script src="login.js" defer type="module"></script>
  </head>
  <body>
    <!--HEADER-->
    <app-header></app-header>

    <!-- Banner lateral de usuario -->
    <perfil-usuario></perfil-usuario>

    <!-- MAIN -->
    <main>
      <!-- Logo Aparkt -->
      <div class="main-izquierdo">
        <img src="../assets/isotipoAparkt.png" alt="Logo" />
        <!-- METER LOGO -->
      </div>
      <article class="telefono">
        <span class="notch"></span>

        <form id="loginForm" novalidate>
          <div class="form-contenido">
            <h2>BIENVENIDO</h2>
            <img src="../assets/imagotipoAparkt.png" alt="Aparkt" />

            <!-- Email -->
            <div class="input-field" id="emailGroup">
              <input
                type="email"
                id="email"
                name="email"
                placeholder=" "
                autocomplete="email"
              />
              <label for="email">Email</label>
              <div id="error-email"></div>
            </div>

            <!-- Contraseña -->
            <div class="input-field" id="passwordGroup">
              <input
                type="password"
                id="password"
                name="password"
                placeholder=" "
                autocomplete="current-password"
              />
              <label for="password">Contraseña</label>
              <div id="error-password"></div>
              <button
                type="button"
                class="ver-contrasena"
                id="togglePassword"
                aria-label="Mostrar contraseña"
              >
                <svg viewBox="0 0 24 24">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>

            <!-- Opciones: Recordarme + Olvidé contraseña -->
            <div class="form-options">
              <label class="checkbox-wrapper">
                <input type="checkbox" name="recordar" />
                <span>Recuérdame</span>
              </label>
              <a href="#">¿Olvidaste tu contraseña?</a>
            </div>

            <!-- Botón de iniciar sesión -->
            <button type="submit">Iniciar sesión</button>

            <!-- otra opcion -->
            <div class="opcion2">
              <span>o continúa con</span>
            </div>

            <!-- Google -->
            <button
              type="button"
              class="btn-google"
              aria-label="Iniciar sesión con Google"
            >
              <svg viewBox="0 0 24 24">
                <path
                  d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"
                  fill="#4285F4"
                />
                <path
                  d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                  fill="#34A853"
                />
                <path
                  d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                  fill="#FBBC05"
                />
                <path
                  d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                  fill="#EA4335"
                />
              </svg>
              <span>Continuar con Google</span>
            </button>
          </div>

          <!-- Enlace para crear usuario nuevo -->
          <p>
            ¿Nuevo usuario? <a href="../signup/signup.html">Crear cuenta</a>
          </p>
        </form>
      </article>
    </main>

    <!--FOOTER-->
    <app-footer></app-footer>
    <script src="../just-validate.min.js"></script>
    <script src="../modoOscuro.js"></script>
  </body>
</html>
