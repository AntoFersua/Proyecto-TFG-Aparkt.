<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Inicia sesión en Aparkt" />
    <meta name="keywords" content="Sesión, Aparkt, Aparcamiento" />
    <meta name="author" content="Aparkt" />
    <title>Log In</title>
    <link rel="stylesheet" type="text/css" href="../estilosGlobales.css" />
    <link rel="stylesheet" type="text/css" href="login.css" />
    <script src="../funcionesGlobales.js" defer></script>
    <script src="login.js"></script>
    <style>
      /* Inline fallback por si login.css no carga */
    </style>
  </head>
  <body>
    <!--HEADER-->
    <header>
      <!-- NAVEGACIÓN -->
      <div class="logoHeader">
        <img src="../assets/imagotipoAparkt.png" alt="Logo" />
      </div>
      <!-- METER LOGO Y PONER DISPLAY:BLOCK -->
      <nav class="navPrincipal">
        <ul>
          <li><a href="../index.html">Mapa</a></li>
          <li><a href="../aparkt/aparkt.html">Aparkt</a></li>
          <li><a href="login.html">Log In</a></li>
          <li><a href="../signup/signup.html">Sign Up</a></li>
        </ul>
      </nav>
      <div id="headerDerecha">
        <button>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            fill="white"
            class="bi bi-translate"
            viewBox="0 0 16 16"
          >
            <path
              d="M4.545 6.714 4.11 8H3l1.862-5h1.284L8 8H6.833l-.435-1.286zm1.634-.736L5.5 3.956h-.049l-.679 2.022z"
            />
            <path
              d="M0 2a2 2 0 0 1 2-2h7a2 2 0 0 1 2 2v3h3a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-3H2a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1zm7.138 9.995q.289.451.63.846c-.748.575-1.673 1.001-2.768 1.292.178.217.451.635.555.867 1.125-.359 2.08-.844 2.886-1.494.777.665 1.739 1.165 2.93 1.472.133-.254.414-.673.629-.89-1.125-.253-2.057-.694-2.82-1.284.681-.747 1.222-1.651 1.621-2.757H14V8h-3v1.047h.765c-.318.844-.74 1.546-1.272 2.13a6 6 0 0 1-.415-.492 2 2 0 0 1-.94.31"
            />
          </svg>
        </button>
        <button>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            fill="white"
            class="bi bi-person"
            viewBox="0 0 16 16"
          >
            <path
              d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0zm4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4zm-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10c-2.29 0-3.516.68-4.168 1.332-.678.678-.83 1.418-.832 1.664h10z"
            />
          </svg>
        </button>
        <button>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="white"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>
      </div>
    </header>

    <!-- MAIN -->
    <main>
      <!-- Logo Aparkt -->
      <div class="main-izquierdo">
        <img src="../assets/isotipoAparkt.png" alt="Logo" />
        <!-- METER LOGO -->
      </div>
      <article class="telefono">
        <span class="notch"></span>

        <form id="loginForm" novalidate>
          <div class="form-contenido">
            <h2>BIENVENIDO</h2>
            <img src="../assets/imagotipoAparkt.png" alt="Aparkt" />

            <!-- Email -->
            <div class="input-field" id="emailGroup">
              <input
                type="text"
                id="email"
                name="email"
                placeholder=" "
                autocomplete="username"
              />
              <label for="email">Usuario</label>
            </div>

            <!-- Contraseña -->
            <div class="input-field" id="passwordGroup">
              <input
                type="password"
                id="password"
                name="password"
                placeholder=" "
                autocomplete="current-password"
              />
              <label for="password">Contraseña</label>
              <button
                type="button"
                class="ver-contrasena"
                id="togglePassword"
                aria-label="Mostrar contraseña"
              >
                <svg viewBox="0 0 24 24">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>

            <!-- Opciones: Recordarme + Olvidé contraseña -->
            <div class="form-options">
              <label class="checkbox-wrapper">
                <input type="checkbox" name="recordar" />
                <span>Recuérdame</span>
              </label>
              <a href="#">¿Olvidaste tu contraseña?</a>
            </div>

            <!-- Botón de iniciar sesión -->
            <button type="submit">Iniciar sesión</button>

            <!-- otra opcion -->
            <div class="opcion2">
              <span>o continúa con</span>
            </div>

            <!-- Google -->
            <button
              type="button"
              class="btn-google"
              aria-label="Iniciar sesión con Google"
            >
              <svg viewBox="0 0 24 24">
                <path
                  d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"
                  fill="#4285F4"
                />
                <path
                  d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                  fill="#34A853"
                />
                <path
                  d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                  fill="#FBBC05"
                />
                <path
                  d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                  fill="#EA4335"
                />
              </svg>
              <span>Continuar con Google</span>
            </button>
          </div>

          <!-- Enlace para crear usuario nuevo -->
          <p>¿Nuevo usuario? <a href="../signup/signup.html">Crear cuenta</a></p>
        </form>
      </article>
    </main>

    <!--FOOTER-->
    <footer>
      <div class="footer-izq">
        <img src="../assets/imagotipoAparkt.png" alt="Aparkt" />
        <span class="footer-copy">&copy; 2026 Aparkt</span>
      </div>
      <div class="footer-sep"></div>
      <section class="footer-centro">
        <span class="footer-label">Síguenos</span>
        <a href="#" aria-label="Instagram">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
            <circle cx="12" cy="12" r="5"/>
            <circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/>
          </svg>
        </a>
        <a href="#" aria-label="TikTok">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M16 3a4 4 0 0 0 4 4v3a7 7 0 0 1-4-1.3V15a6 6 0 1 1-6-6c.3 0 .7 0 1 .1v3.1a3 3 0 1 0 2 2.9V3h3z"/>
          </svg>
        </a>
      </section>
      <div class="footer-sep"></div>
      <section class="footer-der">
        <span class="footer-label">Pagos</span>
        <a href="#" aria-label="PayPal">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M7.1 21H2.5a.6.6 0 0 1-.6-.7L5 3.7a.8.8 0 0 1 .8-.7h6.2c2.2 0 4 .5 5.1 1.4 1.2 1 1.6 2.3 1.4 4.2-.1.5-.2 1.1-.4 1.8-.2.6-.4 1.1-.5 1.7a.8.8 0 0 0 .1.9c.1.1.2.1.3.1a.6.6 0 0 0 .3-.1c1.7-.8 2.9-2 3.4-3.7.9-2.8.5-5.5-1.1-7.1C20.2 1.6 17.5.4 14.2.4H9l-.1.1a.8.8 0 0 0-.8.7l-.3 5.2a.6.6 0 0 0 .6.7h1.6l-.5 8.6a.6.6 0 0 1-.6.6H7.1z"/>
          </svg>
        </a>
        <a href="#" aria-label="Visa">
          <svg viewBox="0 0 48 48" fill="currentColor">
            <path d="M19.7 12l-2.7 10.2h-2.6l2.7-10.2h2.6zm11.7 6.8c0-2.7 2.2-4.8 5-4.8 1.2 0 2.3.4 3.3.8v-2h2.6v15.8h-2.6v-.9c-.9.5-2 .9-3.2.9-2.9 0-5.1-2-5.1-4.8zm5 0c0 1.6-.7 2.5-2.1 2.5-1.3 0-2-1-2-2.6s.7-2.6 2-2.6c1.4 0 2.1 1 2.1 2.7zM34 12l-2.7 10.2h-2.6L31.4 12H34zm-8.5 0l-2.5 10.2h-2.6L23 12h2.5zm4.6 5.5c0-2.7 1.8-4.8 5-4.8 1.2 0 2.3.4 3.3.8v-2h2.6v15.8h-2.6v-.9c-.9.5-2 .9-3.2.9-2.9 0-5.1-2-5.1-4.8zm5 0c0 1.6-.7 2.5-2.1 2.5-1.3 0-2-1-2-2.6s.7-2.6 2-2.6c1.4 0 2.1 1 2.1 2.7z"/>
          </svg>
        </a>
      </section>
    </footer>
  </body>
</html>
