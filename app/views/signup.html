    <!--MAIN-->
    <main>
      <!-- Lado izquierdo (logo) -->
      <section class="izquierda">
        <img src="isotipoAparkt.png" alt="Logo" />
        <!--METER LOGO -->

        <label>
          <input id="aceptarTerminos" type="checkbox" required /> Acepto los Términos de servicio y
          política de privacidad
        </label>

        <button type="submit">Crear Cuenta</button>
      </section>

      <!-- Lado derecho (formulario) -->
      <section class="derecha">
        <h2>Crear tu cuenta</h2>

        <form>
          <div>
            <label>Nombre</label>
            <input id="inputNombre" type="text" placeholder="Introduce tu nombre" required />
          </div>

          <div>
            <label>Apellidos</label>
            <input id="inputApellidos" type="text" placeholder="Introduce tus apellidos" required />
          </div>

          <div>
            <label>Correo Electrónico</label>
            <input id="inputCorreo" type="email" placeholder="Introduce tu correo" required />
          </div>

          <div>
            <label>Número Teléfono</label>
            <input
              id = "inputTelefono"
              type="tel"
              placeholder="Introduce tu número de teléfono"
              required
            />
          </div>

          <div>
            <label>Contraseña</label>
            <input id="inputContrasena" type="password" placeholder="Crea una contraseña" required />
            <small
              >La contraseña tiene que tener mínimo 8 caracteres y 1 caracter
              especial</small
            >
          </div>

          <div>
            <label>Confirmar Contraseña</label>
            <input
              id = "confirmarContrasena"
              type="password"
              placeholder="Confirma tu contraseña"
              required
            />
          </div>

          <p>¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a></p>
        </form>
      </section>
    </main>
