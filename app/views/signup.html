    <!--MAIN-->
    <main>
      <article class="telefono">
        <span class="notch"></span>

        <form>
          <div class="form-contenido">
            <h2>CREAR CUENTA</h2>
            <img src="imagotipoAparkt.png" alt="Aparkt" />

            <!-- Indicador de paso -->
            <div class="indicador-paso">
              <span class="paso activo"></span>
              <span class="paso"></span>
              <span class="paso"></span>
            </div>

            <!-- Sección 1: Nombre y Apellidos -->
            <div class="seccion-formulario activa">
              <div class="input-field">
                <input id="inputNombre" type="text" placeholder=" " required />
                <label for="inputNombre">Nombre</label>
              </div>
              <div class="input-field">
                <input id="inputApellidos" type="text" placeholder=" " required />
                <label for="inputApellidos">Apellidos</label>
              </div>
            </div>

            <!-- Sección 2: Correo y Teléfono -->
            <div class="seccion-formulario">
              <div class="input-field">
                <input id="inputCorreo" type="email" placeholder=" " required />
                <label for="inputCorreo">Correo Electrónico</label>
              </div>
              <div class="input-field">
                <input id="inputTelefono" type="tel" placeholder=" " required />
                <label for="inputTelefono">Número Teléfono</label>
              </div>
            </div>

            <!-- Sección 3: Contraseñas -->
            <div class="seccion-formulario">
              <div class="input-field">
                <input id="inputContrasena" type="password" placeholder=" " required />
                <label for="inputContrasena">Contraseña</label>
                <button type="button" class="ver-contrasena" aria-label="Mostrar contraseña">
                  <svg viewBox="0 0 24 24">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
                <small>Mínimo 8 caracteres y 1 caracter especial</small>
              </div>
              <div class="input-field">
                <input id="confirmarContrasena" type="password" placeholder=" " required />
                <label for="confirmarContrasena">Confirmar Contraseña</label>
                <button type="button" class="ver-contrasena" aria-label="Mostrar contraseña">
                  <svg viewBox="0 0 24 24">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
              </div>
              <label class="checkbox-wrapper">
                <input id="aceptarTerminos" type="checkbox" required />
                <span>Acepto los Términos de servicio y política de privacidad</span>
              </label>
            </div>
          </div>

          <!-- Botones navegación -->
          <div class="nav-pasos">
            <button type="button" class="btn-atras" id="btnAtras">Atrás</button>
            <button type="button" class="btn-siguiente" id="btnSiguiente">Siguiente</button>
            <button type="submit" class="btn-crear" id="btnCrear">Crear Cuenta</button>
          </div>

          <p>¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a></p>
        </form>
      </article>

      <!-- Logo (derecha) -->
      <div class="main-izquierdo">
        <img src="isotipoAparkt.png" alt="Logo" />
      </div>
    </main>
