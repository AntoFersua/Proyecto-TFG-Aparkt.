<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Crea tu cuenta en Aparkt" />
    <meta name="keywords" content="Aparkt, Cuenta, Aparcamiento" />
    <meta name="author" content="Aparkt" />
    <title>Sign Up</title>
    <script src="../just-validate.min.js"></script>
    <link rel="stylesheet" type="text/css" href="../estilosGlobales.css" />
    <link rel="stylesheet" type="text/css" href="signup.css" />
    <script src="estilosSignup.js" defer></script>
    <script src="../validacionVehiculo.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css"
    />
    <script src="../components/Modalpuntos.js"></script>
    <script src="../funcionesGlobales.js" defer></script>
    <script type="module" src="signup.js"></script>
  </head>
  <body>
    <!--HEADER-->
    <app-header></app-header>

    <!-- Banner lateral de usuario -->
    <perfil-usuario></perfil-usuario>

    <!--MAIN-->
    <main>
      <article class="telefono">
        <span class="notch"></span>

        <form id="formUsuario">
          <div class="form-contenido">
            <h2>CREAR CUENTA</h2>
            <img src="../assets/imagotipoAparkt.png" alt="Aparkt" />

            <!-- Indicador de paso -->
            <div class="indicador-paso">
              <span class="paso activo"></span>
              <span class="paso"></span>
              <span class="paso"></span>
            </div>

            <!-- Carrusel de secciones -->
            <div class="owl-carousel owl-theme">
              <!-- Sección 1: Nombre y Apellidos -->
              <div class="seccion-formulario">
                <div class="input-field">
                  <input
                    id="inputNombre"
                    type="text"
                    placeholder=" "
                    name="nombre"
                  />
                  <label for="inputNombre">Nombre</label>
                  <div id="error-nombre"></div>
                </div>
                <div class="input-field">
                  <input
                    id="inputApellidos"
                    type="text"
                    placeholder=" "
                    name="apellido"
                  />
                  <label for="inputApellidos">Apellidos</label>
                  <div id="error-apellidos"></div>
                </div>
              </div>

              <!-- Sección 2: Correo y Teléfono -->
              <div class="seccion-formulario">
                <div class="input-field">
                  <input
                    id="inputCorreo"
                    type="email"
                    placeholder=" "
                    name="email"
                  />
                  <label for="inputCorreo">Correo Electrónico</label>
                  <div id="error-email"></div>
                </div>
                <div class="input-field">
                  <input
                    id="inputTelefono"
                    type="text"
                    placeholder=" "
                    name="telefono"
                  />
                  <label for="inputTelefono">Teléfono</label>
                  <div id="error-telefono"></div>
                </div>
                <div class="input-field">
                  <select id="inputCiudad" name="ciudad">
                    <option value="" disabled selected>
                      Selecciona tu ciudad
                    </option>
                    <option value="Malaga">Malaga</option>
                    <option value="Sevilla">Sevilla</option>
                    <option value="Granada">Granada</option>
                    <option value="Cordoba">Cordoba</option>
                  </select>
                  <label for="inputCiudad">Ciudad</label>
                  <div id="error-ciudad"></div>
                </div>
              </div>

              <!-- Sección 3: Contraseñas -->
              <div class="seccion-formulario">
                <div class="input-field">
                  <input
                    id="inputContrasena"
                    type="password"
                    placeholder=" "
                    name="contrasena"
                  />
                  <label for="inputContrasena">Contraseña</label>
                  <div id="error-contrasena"></div>
                  <button
                    type="button"
                    class="ver-contrasena"
                    aria-label="Mostrar contraseña"
                  >
                    <svg viewBox="0 0 24 24">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z" />
                      <circle cx="12" cy="12" r="3" />
                    </svg>
                  </button>
                </div>
                <div class="input-field">
                  <input
                    id="confirmarContrasena"
                    type="password"
                    placeholder=" "
                    name="confirmarContrasena"
                  />
                  <label for="confirmarContrasena">Confirmar Contraseña</label>
                  <div id="error-confirmarContrasena"></div>
                  <button
                    type="button"
                    class="ver-contrasena"
                    aria-label="Mostrar contraseña"
                  >
                    <svg viewBox="0 0 24 24">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z" />
                      <circle cx="12" cy="12" r="3" />
                    </svg>
                  </button>
                </div>
                <label class="checkbox-wrapper">
                  <input id="aceptarTerminos" type="checkbox" name="terminos" />
                  <span
                    >Acepto los Términos de servicio y política de
                    privacidad</span
                  >
                  <div id="error-aceptarTerminos"></div>
                </label>
              </div>
            </div>
          </div>

          <!-- Botones navegación -->
          <div class="nav-pasos">
            <div class="nav-carrusel"></div>
            <button type="submit" class="btn-crear" id="btnCrear">
              Crear Cuenta
            </button>
          </div>

          <p>
            ¿Ya tienes cuenta? <a href="../login/login.html">Iniciar sesión</a>
          </p>
        </form>
      </article>

      <!-- Logo (derecha) -->
      <div class="main-izquierdo">
        <img src="../assets/isotipoAparkt.png" alt="Logo" />
      </div>
    </main>

    <!--FOOTER-->
    <app-footer></app-footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>
    <script src="estilosSignup.js"></script>
  </body>
</html>
